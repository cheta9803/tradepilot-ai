services:
  postgres:
    image: postgres:16

    container_name: tradepilot-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: tradepilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tradepilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: tradepilot-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: